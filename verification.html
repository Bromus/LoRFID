<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      height: 100%;
      background: #0a0a0a;
    }
    body {
      min-height: 100%;
      font-family: "Space Mono", monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(120, 0, 0, 0.08) 0%, transparent 50%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.02) 2px,
          rgba(255,255,255,0.02) 4px
        );
      pointer-events: none;
      z-index: 0;
    }
    .verify {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1s ease-out;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2rem, 10vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #fff;
      line-height: 0.95;
      margin-bottom: 1.5rem;
    }
    form {
      text-align: left;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.9rem 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      color: #e0e0e0;
      margin-bottom: 1rem;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #555;
    }
    input[type="password"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button {
      width: 100%;
      padding: 0.9rem 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      border-color: #555;
      color: #fff;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid #4a2020;
      background: rgba(120, 0, 0, 0.15);
      font-size: 0.85rem;
      color: #c88;
      display: none;
    }
    .error.show {
      display: block;
    }
    .countdown {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="verify">
    <p class="label">Access</p>
    <h1>VERIFICATION</h1>
    <form id="verifyForm">
      <input type="password" id="password" placeholder="Enter password" autocomplete="off">
      <button type="submit" id="submitBtn">Submit</button>
    </form>
    <div class="error" id="error">
      You did not enter a valid password. You can try again in <span id="countdown">10</span> seconds.
    </div>
  </div>
  <script>
    var CORRECT_PASSWORD = "testing";
    var LOCKOUT_SECONDS = 10;

    var form = document.getElementById("verifyForm");
    var passwordInput = document.getElementById("password");
    var submitBtn = document.getElementById("submitBtn");
    var errorEl = document.getElementById("error");
    var countdownEl = document.getElementById("countdown");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var entered = passwordInput.value;

      if (entered === CORRECT_PASSWORD) {
        window.location.href = "invited.html";
        return;
      }

      errorEl.classList.add("show");
      passwordInput.disabled = true;
      submitBtn.disabled = true;

      var secondsLeft = LOCKOUT_SECONDS;
      countdownEl.textContent = secondsLeft;

      var timer = setInterval(function () {
        secondsLeft--;
        countdownEl.textContent = secondsLeft;
        if (secondsLeft <= 0) {
          clearInterval(timer);
          errorEl.classList.remove("show");
          passwordInput.disabled = false;
          submitBtn.disabled = false;
          passwordInput.value = "";
          passwordInput.focus();
        }
      }, 1000);
    });
  </script>
</body>
</html>
