<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      height: 100%;
      background: #0a0a0a;
    }
    body {
      min-height: 100%;
      font-family: "Space Mono", monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(120, 0, 0, 0.08) 0%, transparent 50%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.02) 2px,
          rgba(255,255,255,0.02) 4px
        );
      pointer-events: none;
      z-index: 0;
    }
    .orders {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1s ease-out;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .token {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.5rem, 12vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #fff;
      line-height: 1;
      margin-bottom: 1.25rem;
    }
    .label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2rem, 10vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #fff;
      line-height: 0.95;
      margin-bottom: 1.5rem;
    }
    .order-box {
      text-align: center;
      border: 1px solid #222;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      position: relative;
      overflow: hidden;
    }
    .order-box .order-text {
      font-size: 1rem;
      color: #ccc;
      line-height: 1.5;
      transition: opacity 0.4s ease;
    }
    .order-box .compliance-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.2rem;
      color: #ffecec;
      background: transparent;
      padding: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .countdown {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: opacity 0.4s ease;
    }
    .countdown.warn {
      color: #ff6666;
    }
    .order-box.flash {
      animation: flash 1.4s ease-in-out infinite;
    }
    @keyframes flash {
      0%, 100% { background-color: rgba(255, 255, 255, 0.02); }
      50% { background-color: rgba(120, 0, 0, 0.35); }
    }
    .order-box.compliance-pulse {
      animation: compliancePulse 2.8s ease-in-out infinite;
    }
    @keyframes compliancePulse {
      0%, 100% {
        background-color: rgba(120, 0, 0, 0.3);
        border-color: rgba(120, 0, 0, 0.7);
      }
      50% {
        background-color: rgba(180, 0, 0, 0.65);
        border-color: rgba(255, 120, 120, 0.9);
      }
    }
    .foot {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="orders">
    <h1 class="token" id="tokenHeading">#?</h1>
    <p class="label">Your</p>
    <h1>ORDERS</h1>
    <div class="order-box" id="orderBox">
      <p class="order-text" id="orderText" style="margin-bottom: 1.25rem;">Get Naked.  Take Picture. Send To Me.</p>
      <p class="order-text compliance-text" id="complianceText">COMPLIANCE IS MANDATORY</p>
      <p class="countdown" id="countdown">Order self-destructs in 10 seconds.</p>
    </div>
    <p class="foot">Obedience will be Rewarded</p>
  </div>
  <script>
    // Same Apps Script endpoint used on verification/accepted pages
    var SHEET_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7pERiNYGSmrTqmGnHf-ywzFUB9rqJSUHiJ7f8SmjNGAis8zEP1LASs_KC2LYl0yP3/exec";

    // Show token from query string
    var params = new URLSearchParams(window.location.search);
    var tokenParam = params.get("token");
    var nameParam = params.get("name");
    var tokenHeading = document.getElementById("tokenHeading");
    if (tokenHeading && tokenParam) {
      tokenHeading.textContent = "#" + tokenParam;
    }

    var countdownEl = document.getElementById("countdown");
    var orderBoxEl = document.getElementById("orderBox");
    var orderTextEl = document.getElementById("orderText");
    var complianceEl = document.getElementById("complianceText");

    // For Loppan, we don't want the hard-coded text flashing
    // before we know the real next order, so clear it up front.
    var originalDefaultText = orderTextEl.textContent;
    if (nameParam && nameParam.toLowerCase() === "loppan") {
      orderTextEl.textContent = "";
    }

    function startSelfDestructCountdown(onCompliance) {
      var seconds = 20;
      if (!(countdownEl && orderTextEl && complianceEl && orderBoxEl)) return;

      countdownEl.textContent = "Order self-destructs in " + seconds + " seconds.";
      var timer = setInterval(function () {
        seconds--;
        if (seconds > 0) {
          countdownEl.textContent = "Order self-destructs in " + seconds + " seconds.";
          if (seconds <= 8) {
            countdownEl.classList.add("warn");
          }
        } else {
          clearInterval(timer);
          // fade out order + countdown
          orderTextEl.style.opacity = "0";
          countdownEl.style.opacity = "0";

          // fade in compliance after a short delay so transitions are visible
          setTimeout(function () {
            orderTextEl.style.display = "none";
            countdownEl.style.display = "none";
            complianceEl.style.opacity = "1";
            orderBoxEl.classList.add("compliance-pulse");
            if (typeof onCompliance === "function") onCompliance();
          }, 400);
        }
      }, 1000);
    }

    function markOrderGiven() {
      if (!SHEET_SCRIPT_URL || !nameParam) return;
      try {
        var q = new URLSearchParams();
        q.set("mode", "next_order");
        if (tokenParam) q.set("token", tokenParam);
        if (nameParam) q.set("name", nameParam);
        var iframe = document.createElement("iframe");
        iframe.style.cssText = "position:absolute;width:0;height:0;border:0;visibility:hidden";
        iframe.src = SHEET_SCRIPT_URL + "?" + q.toString();
        document.body.appendChild(iframe);
      } catch (e) {}
    }

    function loadNextOrder() {
      var isLoppan = !!(nameParam && nameParam.toLowerCase() === "loppan");

      if (!isLoppan || !SHEET_SCRIPT_URL) {
        startSelfDestructCountdown();
        return;
      }

      // Use order passed from verification if present (no fetch needed)
      try {
        if (typeof sessionStorage !== "undefined" && sessionStorage.getItem("nextOrder")) {
          var passedOrder = sessionStorage.getItem("nextOrder");
          sessionStorage.removeItem("nextOrder");
          if (passedOrder) {
            orderTextEl.textContent = passedOrder;
            startSelfDestructCountdown(markOrderGiven);
            return;
          }
        }
      } catch (e) {}

      // Fallback: fetch next order (e.g. direct visit to orders page)
      var q = new URLSearchParams();
      q.set("mode", "peek_next_order");
      if (tokenParam) q.set("token", tokenParam);
      if (nameParam) q.set("name", nameParam);

      try {
        fetch(SHEET_SCRIPT_URL + "?" + q.toString(), { method: "GET" })
          .then(function (res) {
            if (!res.ok) throw new Error("Bad response");
            return res.json();
          })
          .then(function (data) {
            if (data && data.order) {
              orderTextEl.textContent = data.order;
            } else {
              orderTextEl.textContent = originalDefaultText;
            }
            startSelfDestructCountdown(markOrderGiven);
          })
          .catch(function () {
            if (!orderTextEl.textContent) orderTextEl.textContent = originalDefaultText;
            startSelfDestructCountdown(markOrderGiven);
          });
      } catch (e) {
        startSelfDestructCountdown(markOrderGiven);
      }
    }

    loadNextOrder();
  </script>
</body>
</html>
