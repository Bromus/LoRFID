<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accepted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      height: 100%;
      background: #0a0a0a;
    }
    body {
      min-height: 100%;
      font-family: "Space Mono", monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(120, 0, 0, 0.08) 0%, transparent 50%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.02) 2px,
          rgba(255,255,255,0.02) 4px
        );
      pointer-events: none;
      z-index: 0;
    }
    .accepted {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1s ease-out;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(1.75rem, 8vw, 2.75rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .sub {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .token-label {
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 0.6rem;
    }
  </style>
</head>
<body>
  <div class="accepted">
    <h1>We expect your presence.</h1>
    <p class="sub">You're in. Be there.</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get("token") || "";
      var name = params.get("name") || "";
      if (!token && !name) return;

      if (token) {
        var acceptedDiv = document.querySelector(".accepted");
        if (acceptedDiv) {
          var tokenEl = document.createElement("p");
          tokenEl.className = "token-label";
          tokenEl.textContent = "You Are Token #" + token;
          acceptedDiv.insertBefore(tokenEl, acceptedDiv.firstChild);
        }
      }

      // Log to sheet in the background (hidden iframe), then clean URL
      var scriptUrl = "https://script.google.com/macros/s/AKfycbz7pERiNYGSmrTqmGnHf-ywzFUB9rqJSUHiJ7f8SmjNGAis8zEP1LASs_KC2LYl0yP3/exec";
      var q = new URLSearchParams();
      q.set("token", token);
      q.set("name", name);
      var iframe = document.createElement("iframe");
      iframe.style.cssText = "position:absolute;width:0;height:0;border:0;visibility:hidden";
      iframe.src = scriptUrl + "?" + q.toString();
      document.body.appendChild(iframe);

      // Remove query string from address bar
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname + window.location.hash);
      }
    })();
  </script>
</body>
</html>
